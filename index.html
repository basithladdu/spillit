<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="alternate icon" href="/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#8B5CF6" />

  <!-- Primary Meta Tags -->
  <title>Spillit - Map Your Memories Anonymously</title>
  <meta name="title" content="Spillit - Map Your Memories Anonymously" />
  <meta name="description"
    content="Spillit is a location-based memory sharing app. Pin your stories, moments, and anonymous crushes to places around the world. Share anonymously and discover what others felt at the same spot." />
  <meta name="keywords"
    content="Spillit, anonymous memories, location stories, memory map, social map, anonymous messages, crush map, secret stories" />
  <meta name="author" content="Spillit Team" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://spillit.app/" />
  <meta property="og:title" content="Spillit - Map Your Memories Anonymously" />
  <meta property="og:description"
    content="Pin your story to a place. Share memories anonymously. Discover what happened where. Spillit is where moments live." />
  <meta property="og:image" content="/og-image.jpg" />

  <!-- Performance Optimizations -->
  <link rel="preconnect" href="https://api.mapbox.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Fonts - Playful Geometric System -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">

  <!-- Schema.org JSON-LD -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Spillit",
      "url": "https://spillit.app",
      "logo": "https://spillit.app/logo.png",
      "description": "An anonymous location-based memory sharing platform.",
      "applicationCategory": "SocialNetworking",
      "operatingSystem": "Web, Mobile"
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
